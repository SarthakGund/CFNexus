# CFNexus — Nginx reverse proxy
# Routes:
#   /api/          /oauth2/   /login/oauth2/   /ws   -> backend  (http://backend:8080)
#   everything else                                  -> frontend (http://frontend:3000)
# Security headers per spec §17. SSL/TLS placeholders for Let's Encrypt are
# included (commented) along with an HTTP->HTTPS redirect.

user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;

    # Allow large-ish bodies for code submissions (spec: 64KB code limit + overhead).
    client_max_body_size 1m;

    # Upstreams (resolved on the shared docker network).
    upstream backend {
        server backend:8080;
    }
    upstream frontend {
        server frontend:3000;
    }

    # WebSocket upgrade mapping.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------------------------------------------------------
    # HTTP server (port 80).
    # In production, uncomment the redirect block below and serve the app from
    # the 443 server block instead.
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # --- Let's Encrypt ACME challenge (keep reachable over plain HTTP) ---
        # location /.well-known/acme-challenge/ {
        #     root /var/www/certbot;
        # }

        # --- HTTP -> HTTPS redirect (enable in production) ---
        # return 301 https://$host$request_uri;

        # ----- Security headers (spec §17) -----
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' data: cdn.jsdelivr.net; connect-src 'self' ws: wss: https://codeforces.com; frame-src 'self' https://codeforces.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        # Strict-Transport-Security belongs in the TLS (443) server block only.

        # Lightweight health endpoint for container healthchecks.
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # ----- Backend: REST API -----
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----- Backend: OAuth2 initiation -----
        location /oauth2/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----- Backend: OAuth2 callback -----
        location /login/oauth2/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----- Backend: WebSocket (STOMP over SockJS) -----
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ----- Frontend: everything else (Next.js) -----
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server (port 443) — PRODUCTION TLS. Uncomment and provide certs.
    # -------------------------------------------------------------------------
