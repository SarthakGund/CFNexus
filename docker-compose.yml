# CFNexus — Docker Compose for local/prod infrastructure
# Services: postgres, redis, judge0 (+ judge0-db, judge0-redis, judge0-workers), nginx
# Backend and frontend are included as commented/optional services (built in later phases).
#
# Usage:
#   cp .env.example .env   # then fill in real values
#   docker compose up -d postgres redis        # minimal app dependencies
#   docker compose up -d                        # everything incl. judge0 + nginx

services:
  # ---------------------------------------------------------------------------
  # Application database (Spring Boot / Flyway target)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: cfnexus-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-cfduel}
      POSTGRES_USER: ${DB_USERNAME:-cfduel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cfnexus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cfduel} -d ${DB_NAME:-cfduel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — Spring Session, rate limiting, presence, chat relay cache
  # AUTH password enforced via --requirepass (spec §17).
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7
    container_name: cfnexus-redis
    restart: unless-stopped
    env_file: .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redissecret}", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cfnexus
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Judge0 — sandboxed code execution (spec §12). Judge0 needs its OWN
  # dedicated Postgres + Redis, separate from the application ones above.
  # The judge0 image runs the API server; judge0-workers runs the queue worker.
  # ---------------------------------------------------------------------------
  judge0-db:
    image: postgres:16
    container_name: cfnexus-judge0-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${JUDGE0_DB_NAME:-judge0}
      POSTGRES_USER: ${JUDGE0_DB_USERNAME:-judge0}
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD:-judge0secret}
    volumes:
      - judge0-db-data:/var/lib/postgresql/data
    networks:
      - cfnexus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${JUDGE0_DB_USERNAME:-judge0}"]
      interval: 10s
      timeout: 5s
      retries: 5

  judge0-redis:
    image: redis:7
    container_name: cfnexus-judge0-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${JUDGE0_REDIS_PASSWORD:-judge0redis}", "--appendonly", "yes"]
    volumes:
      - judge0-redis-data:/data
    networks:
      - cfnexus
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${JUDGE0_REDIS_PASSWORD:-judge0redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  judge0:
    image: judge0/judge0:1.13.1
    container_name: cfnexus-judge0
    restart: unless-stopped
    # privileged is required by Judge0 for its isolate sandbox (cgroups).
    privileged: true
    env_file: .env
    environment:
      POSTGRES_HOST: judge0-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${JUDGE0_DB_NAME:-judge0}
      POSTGRES_USER: ${JUDGE0_DB_USERNAME:-judge0}
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD:-judge0secret}
      REDIS_HOST: judge0-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${JUDGE0_REDIS_PASSWORD:-judge0redis}
      # Optional API auth header expected by clients (matches CODE_RUNNER_API_KEY).
      AUTHN_TOKEN: ${CODE_RUNNER_API_KEY:-judge0-api-key}
    ports:
      - "2358:2358"
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    networks:
      - cfnexus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:2358/system_info >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: cfnexus-judge0-workers
    restart: unless-stopped
    privileged: true
    env_file: .env
    environment:
      POSTGRES_HOST: judge0-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${JUDGE0_DB_NAME:-judge0}
      POSTGRES_USER: ${JUDGE0_DB_USERNAME:-judge0}
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD:-judge0secret}
      REDIS_HOST: judge0-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${JUDGE0_REDIS_PASSWORD:-judge0redis}
    # Override the entrypoint to run the async worker instead of the API server.
    command: ["./scripts/workers"]
    depends_on:
      judge0:
        condition: service_started
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    networks:
      - cfnexus

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy / TLS termination (spec §17). Routes /api, /ws,
  # /oauth2, /login/oauth2 to backend; everything else to frontend.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: cfnexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount Let's Encrypt certs here in production (see commented 443 block).
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - cfnexus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    # depends_on backend/frontend once those services are enabled below.
    # depends_on:
    #   - backend
    #   - frontend

  # ---------------------------------------------------------------------------
  # OPTIONAL: backend (Spring Boot) — enabled in later phases.
  # Build context points at ./backend (Agent B owns the Java sources).
  # ---------------------------------------------------------------------------
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: cfnexus-backend
  #   restart: unless-stopped
  #   env_file: .env
  #   environment:
  #     DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-cfduel}
  #     DB_USERNAME: ${DB_USERNAME:-cfduel}
  #     DB_PASSWORD: ${DB_PASSWORD:-secret}
  #     REDIS_HOST: redis
  #     REDIS_PORT: "6379"
  #     REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
  #     CODE_RUNNER_URL: http://judge0:2358
  #   expose:
  #     - "8080"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - cfnexus

  # ---------------------------------------------------------------------------
  # OPTIONAL: frontend (Next.js 15) — enabled in later phases.
  # Build context points at ./frontend (Agent C owns the Next.js sources).
  # ---------------------------------------------------------------------------
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: cfnexus-frontend
  #   restart: unless-stopped
  #   environment:
  #     NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
  #     NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost/ws}
  #   expose:
  #     - "3000"
  #   depends_on:
  #     - backend
  #   networks:
  #     - cfnexus

networks:
  cfnexus:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  judge0-db-data:
  judge0-redis-data:
